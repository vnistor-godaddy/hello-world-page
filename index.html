<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Simple Page</title>

    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Header / Navigation */
        header {
            background-color: #333;
            padding: 15px 20px;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            color: #fff;
            font-size: 18px;
            font-weight: bold;
        }

        .menu {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        .menu li a {
            color: #fff;
            text-decoration: none;
            font-size: 14px;
        }

        .menu li a:hover {
            text-decoration: underline;
        }

        /* Main Content */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px;
        }

        .content h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .content p {
            font-size: 18px;
            color: #555;
        }

        /* Footer */
        footer {
            background-color: #f2f2f2;
            text-align: center;
            padding: 15px;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <nav>
            <div class="logo">MySite</div>
            <ul class="menu">
                <li>#Home</a></li>
                <li>#About</a></li>
                <li>#Services</a></li>
                <li>#Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- Main Content -->
    <main>
        <div class="content">
            <h1>Hello, World 👋</h1>
            <p>This is your simple HTML starter page.</p>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <p>© 2026 MySite. All rights reserved.</p>
        <p>Edit this footer with your own links or info.</p>
    </footer>

</body>
</html>
